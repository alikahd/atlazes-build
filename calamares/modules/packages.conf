# =============================================================================
# ATLAZES OS - Calamares Packages Module
# Post-install package operations
# =============================================================================

---
backend: apt

# Operations to perform after installation
operations:
    - remove:
        - calamares
        - calamares-settings-debian
        - live-boot
        - live-boot-initramfs-tools
        - live-config
        - live-config-systemd
        - live-tools
        - user-setup
    - install:
        - linux-image-amd64
        - linux-headers-amd64
