# =============================================================================
# ATLAZES OS - Calamares Bootloader Module
# مُصحَّح: استخدام الصيغة الصحيحة لـ Debian Calamares
# =============================================================================

---
efiBootLoader: "grub"
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"
grubTimeout: 5
writeOsprober: true

# UEFI
grubInstallArguments:
    - "--target=x86_64-efi"
    - "--efi-directory=/boot/efi"
    - "--bootloader-id=ATLAZES"
    - "--recheck"

# BIOS — الاسم الصحيح في Debian Calamares
grubInstallArgumentsForBios:
    - "--target=i386-pc"
    - "--recheck"
