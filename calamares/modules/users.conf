# =============================================================================
# ATLAZES OS - Calamares Users Module
# مُصحَّح: حذف wheel group (غير موجود في Debian، يُستخدم sudo بدلاً منه)
# =============================================================================

---
defaultGroups:
    - name: users
      must_exist: false
      system: false
    - name: lp
      must_exist: false
      system: false
    - name: video
      must_exist: false
      system: false
    - name: audio
      must_exist: false
      system: false
    - name: sudo
      must_exist: true
      system: true
    - name: plugdev
      must_exist: false
      system: false
    - name: netdev
      must_exist: false
      system: false
    - name: bluetooth
      must_exist: false
      system: false
    - name: cdrom
      must_exist: false
      system: false
    - name: dip
      must_exist: false
      system: false

autologinGroup: autologin
doAutologin: false
setRootPassword: true

passwordRequirements:
    minLength: 8
    maxLength: -1
    libpwquality:
        - minlen=8
        - minclass=2

userShell: /bin/bash

hostname:
    location: EtcFile
    writeHostsFile: true
    template: "atlazes-${first}"
