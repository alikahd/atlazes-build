# =============================================================================
# ATLAZES OS - Calamares Users Module
# =============================================================================

---
# Default groups for new user
defaultGroups:
    - name: users
      must_exist: false
      system: false
    - name: lp
      must_exist: false
      system: false
    - name: video
      must_exist: false
      system: false
    - name: network
      must_exist: false
      system: false
    - name: storage
      must_exist: false
      system: false
    - name: wheel
      must_exist: false
      system: false
    - name: audio
      must_exist: false
      system: false
    - name: sudo
      must_exist: true
      system: true
    - name: plugdev
      must_exist: false
      system: false
    - name: netdev
      must_exist: false
      system: false
    - name: bluetooth
      must_exist: false
      system: false
    - name: cdrom
      must_exist: false
      system: false
    - name: floppy
      must_exist: false
      system: false
    - name: dip
      must_exist: false
      system: false

# Auto-login option
autologinGroup: autologin
doAutologin: false

# Set root password same as user
setRootPassword: true

# Require strong passwords
passwordRequirements:
    minLength: 8
    maxLength: -1
    libpwquality:
        - minlen=8
        - minclass=2

# Shell
userShell: /bin/bash

# Hostname
hostname:
    location: EtcFile
    writeHostsFile: true
    template: "atlazes-${first}"
