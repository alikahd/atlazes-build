# =============================================================================
# ATLAZES OS - Calamares Partition Module
# =============================================================================

---
# Default filesystem
defaultFileSystemType: "ext4"

# Filesystem options
availableFileSystemTypes: ["ext4", "btrfs", "xfs", "f2fs"]

# Enable LUKS encryption option
enableLuksAutomatedPartitioning: true

# Swap options
userSwapChoices:
    - none
    - small
    - suspend
    - reuse
    - file

# Default swap choice
initialSwapChoice: small

# EFI system partition size (MiB)
efiSystemPartitionSize: 512

# EFI system partition filesystem
efiSystemPartitionName: "EFI"

# Minimum partition sizes
requiredStorage: 20.0

# Partition table type
# gpt for UEFI, msdos for BIOS
# auto-detected based on boot mode
