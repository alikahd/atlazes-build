# =============================================================================
# ATLAZES OS - Calamares Installer Settings
# =============================================================================

---
# Modules search paths
modules-search: [ local, /usr/lib/calamares/modules ]

# Sequence of installer phases
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary

  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - luksbootkeyfile
    - luksopenswaphookcfg
    - initcpiocfg
    - initcpio
    - removeuser
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - grubcfg
    - bootloader
    - packages
    - luksbootkeyfile
    - plymouthcfg
    - initramfscfg
    - initramfs
    - removeuser
    - umount

  - show:
    - finished

# Branding
branding: atlazes

# Prompt before quit
prompt-install: false

# Disable cancel button during install
disable-cancel: false
disable-cancel-during-exec: true

# Logging
log-file: /var/log/calamares/session.log
