# =============================================================================
# ATLAZES OS - Calamares Installer Settings
# مُصحَّح: حذف جميع الوحدات غير الموجودة في Debian Calamares
# =============================================================================

---
modules-search: [ local, /usr/lib/calamares/modules ]

sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary

  - exec:
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - removeuser
    - users
    - displaymanager
    - networkcfg
    - hwclock
    - services-systemd
    - grubcfg
    - bootloader
    - packages
    - umount

  - show:
    - finished

branding: atlazes
prompt-install: false
disable-cancel: false
disable-cancel-during-exec: true
log-file: /var/log/calamares/session.log
