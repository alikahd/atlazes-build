# ATLAZES OS - إعداد X11 الافتراضي
# يعمل مع VirtualBox و VMware والأجهزة الحقيقية
# يستخدم modesetting driver مع تعطيل hardware acceleration كـ fallback آمن

Section "ServerFlags"
    Option "AutoAddDevices"    "true"
    Option "AutoEnableDevices" "true"
EndSection

Section "Device"
    Identifier "Configured Video Device"
    Driver     "modesetting"
    Option     "AccelMethod" "none"
    Option     "DRI"         "false"
EndSection

Section "Screen"
    Identifier "Default Screen"
    DefaultDepth 24
    SubSection "Display"
        Depth  24
        Modes  "1280x800" "1024x768" "800x600" "640x480"
    EndSubSection
EndSection
