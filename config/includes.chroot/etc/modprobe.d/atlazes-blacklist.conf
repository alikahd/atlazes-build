# =============================================================================
# ATLAZES OS - Kernel Module Blacklist
# FIXED: Removed squashfs (required for live boot and AppImage)
#        Removed hfsplus (needed to read macOS drives)
#        Removed udf (needed for DVD/Blu-ray)
#        Kept only genuinely unused/dangerous protocols
# =============================================================================

# ── Uncommon network protocols (attack surface reduction) ─────────────────────
install dccp    /bin/false
install sctp    /bin/false
install rds     /bin/false
install tipc    /bin/false
install n-hdlc  /bin/false
install ax25    /bin/false
install netrom  /bin/false
install x25     /bin/false
install rose    /bin/false
install decnet  /bin/false
install econet  /bin/false
install af_802154 /bin/false
install ipx     /bin/false
install appletalk /bin/false
install psnap   /bin/false
install p8023   /bin/false
install p8022   /bin/false
install can     /bin/false
install atm     /bin/false

# ── Uncommon filesystems ──────────────────────────────────────────────────────
# NOTE: squashfs is REQUIRED for live boot and AppImage - do NOT blacklist
# NOTE: udf is needed for DVD/Blu-ray - do NOT blacklist
# NOTE: hfsplus is needed to read macOS drives - do NOT blacklist
install cramfs  /bin/false
install freevxfs /bin/false
install jffs2   /bin/false
install hfs     /bin/false

# ── Firewire (DMA attack vector) ──────────────────────────────────────────────
install firewire-core /bin/false
install firewire-ohci /bin/false
install firewire-sbp2 /bin/false

# ── Thunderbolt (DMA attack vector) ───────────────────────────────────────────
# UNCOMMENT if you do not use Thunderbolt devices
# install thunderbolt /bin/false

# ── USB storage ───────────────────────────────────────────────────────────────
# KEEP COMMENTED - USB drives are needed by most users
# Uncomment only for maximum security (kiosk/server use)
# install usb-storage /bin/false

# ── vmwgfx ────────────────────────────────────────────────────────────────────
# ملاحظة: vmwgfx لا يُضاف إلى blacklist
# xserver-xorg-video-vmware يحتاجه، وإضافته للـ blacklist تُسبب فشل Xorg
# hook 0043 يستخدم fbdev driver بدلاً من vmware driver
