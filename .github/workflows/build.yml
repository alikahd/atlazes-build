name: Build ATLAZES ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-common \
            syslinux-efi \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            rsync \
            curl \
            wget \
            ca-certificates

      - name: Prepare environment
        run: |
          mkdir -p build
          mkdir -p output
          chmod +x build.sh || true
          chmod +x scripts/*.sh || true

      - name: Build ISO
        run: |
          sudo ./build.sh

      - name: List output files
        run: |
          echo "==== OUTPUT FILES ===="
          find . -type f -name "*.iso" || true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlazes-os-iso
          path: |
            output/*.iso
            *.iso
            live-image-*.iso
          if-no-files-found: warn