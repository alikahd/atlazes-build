name: Build ATLAZES OS ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release after build?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      release_tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: false
        default: 'v2.0.0'

jobs:
  build:
    name: Build ATLAZES OS
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. تحرير مساحة القرص ─────────────────────────────────────────────────
      - name: Free disk space
        run: |
          echo "=== Disk before ==="
          df -h /
          sudo apt-get remove -y \
            '^dotnet-.*' '^llvm-.*' '^php.*' \
            azure-cli google-cloud-sdk google-chrome-stable \
            firefox powershell mono-devel \
            2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            /usr/local/share/chromium \
            /usr/local/share/powershell 2>/dev/null || true
          echo "=== Disk after ==="
          df -h /

      # ── 3. تثبيت التبعيات ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            wget xorriso squashfs-tools \
            grub-pc-bin grub-efi-amd64-bin \
            mtools dosfstools isolinux syslinux-common \
            rsync curl

      # ── 4. التحقق من البيئة ──────────────────────────────────────────────────
      - name: Verify environment
        run: |
          echo "xorriso: $(xorriso --version 2>&1 | head -1)"
          echo "mksquashfs: $(mksquashfs -version 2>&1 | head -1)"
          df -h /

      # ── 5. بناء ISO ─────────────────────────────────────────────────────────
      - name: Build ATLAZES OS ISO
        run: |
          chmod +x build.sh
          sudo ./build.sh build

      # ── 6. عرض النتائج ───────────────────────────────────────────────────────
      - name: Show build results
        if: always()
        run: |
          echo "=== Output ==="
          ls -lh output/ 2>/dev/null || echo "No output directory"
          echo "=== Disk usage ==="
          df -h /
          echo "=== Build log (last 80 lines) ==="
          tail -80 build.log 2>/dev/null || true

      # ── 7. رفع ISO كـ artifact ──────────────────────────────────────────────
      - name: Upload ISO artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: atlazes-os-iso
          path: |
            output/*.iso
            output/*.sha256
            output/*.md5
          retention-days: 30

      # ── 8. رفع سجل البناء عند الفشل ─────────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log
          retention-days: 7

      # ── 9. تقسيم ISO إذا كان أكبر من 2GB ──────────────────────────────────────
      - name: Split ISO for GitHub Release (2GB limit)
        if: success()
        run: |
          ISO_FILE=$(find output/ -name "*.iso" | head -1)
          if [[ -z "$ISO_FILE" ]]; then
            echo "No ISO file found, skipping split."
            exit 0
          fi

          ISO_SIZE=$(stat -c%s "$ISO_FILE")
          MAX_SIZE=1900000000

          if [[ $ISO_SIZE -gt $MAX_SIZE ]]; then
            echo "ISO is ${ISO_SIZE} bytes — splitting into parts..."
            split -b 1900M "$ISO_FILE" "${ISO_FILE}.part"
            rm "$ISO_FILE"
            echo "Parts created:"
            ls -lh output/*.part*

            # إنشاء سكريبت لإعادة التجميع
            {
              echo '#!/bin/bash'
              echo '# إعادة تجميع أجزاء ISO'
              echo 'echo "Joining ISO parts..."'
              echo 'cat atlazes-os-*.iso.part* > atlazes-os-2.0.0-amd64.iso'
              echo 'echo "Done! Verify with: sha256sum -c atlazes-os-*.sha256"'
            } > output/JOIN-ISO.sh
            chmod +x output/JOIN-ISO.sh

            # تحديث checksum
            cat output/*.iso.part* | sha256sum | awk '{print $1 "  atlazes-os-2.0.0-amd64.iso"}' > output/atlazes-os-2.0.0-amd64.iso.sha256
          else
            echo "ISO is ${ISO_SIZE} bytes — no split needed."
          fi

      # ── 10. إنشاء GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        if: >
          success() && (
            startsWith(github.ref, 'refs/tags/v') ||
            github.event.inputs.create_release == 'true'
          )
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}
          name: "ATLAZES OS ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}"
          files: |
            output/*
          body: |
            ## ATLAZES OS ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}

            **القاعدة:** Debian 13 (Trixie) Live XFCE
            **الطريقة:** ISO Remastering (Official Debian Live + ATLAZES customizations)

            ### التحميل
            إذا كان ISO مُقسَّم إلى أجزاء (`.partaa`, `.partab`, ...):
            ```bash
            # Linux/macOS:
            cat atlazes-os-*.iso.part* > atlazes-os.iso

            # أو استخدم السكريبت:
            bash JOIN-ISO.sh
            ```

            ### التحقق
            ```bash
            sha256sum -c atlazes-os-*.sha256
            ```

            ### نسخ على USB
            ```bash
            sudo dd if=atlazes-os-*.iso of=/dev/sdX bs=4M status=progress oflag=sync
            ```

            ### المميزات
            - 🔒 Security hardening (kernel, AppArmor, UFW, audit)
            - 🕵️ Privacy tools (Tor, MAC randomization, Firefox policies)
            - 🛡️ Application sandboxing (Firejail)
            - 💻 Calamares installer
          draft: false
          prerelease: ${{ contains(github.event.inputs.release_tag || github.ref_name, 'beta') || contains(github.event.inputs.release_tag || github.ref_name, 'rc') }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
