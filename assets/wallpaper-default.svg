<?xml version="1.0" encoding="UTF-8"?>
<!-- ATLAZUS OS - Default desktop wallpaper, modern low-noise identity -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="halo" cx="68%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.24"/>
      <stop offset="46%" stop-color="#14b8a6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="18%" cy="72%" r="48%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="52%" stop-color="#67e8f9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="20%" y1="4%" x2="84%" y2="94%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="48%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <pattern id="mesh" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M120 0H0V120" fill="none" stroke="#67e8f9" stroke-width="0.8" opacity="0.045"/>
      <circle cx="0" cy="0" r="2" fill="#67e8f9" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#mesh)"/>
  <rect width="1920" height="1080" fill="url(#halo)"/>
  <rect width="1920" height="1080" fill="url(#leftGlow)"/>

  <g opacity="0.34">
    <path d="M-80 690 C330 592 520 598 850 668 C1180 738 1450 710 2000 558"
          fill="none" stroke="url(#line)" stroke-width="2"/>
    <path d="M-90 724 C340 626 552 640 864 702 C1186 766 1488 746 2008 620"
          fill="none" stroke="url(#line)" stroke-width="1" opacity="0.55"/>
  </g>

  <g transform="translate(1450 475)" opacity="0.18">
    <path d="M0-255 166-188v128c0 104-65 188-166 236C-101 128-166 44-166-60v-128Z"
          fill="#07111f" stroke="url(#mark)" stroke-width="8"/>
    <ellipse cx="0" cy="-12" rx="210" ry="70" fill="none" stroke="url(#mark)" stroke-width="7"
             transform="rotate(-23)" opacity="0.9"/>
    <path d="M0-162-102 96h55l20-55h54l20 55h55Z" fill="url(#mark)"/>
    <path d="M0-88-17-10h34Z" fill="#07111f"/>
    <path d="M-31 10h62" stroke="#f8fafc" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g transform="translate(146 828)">
    <text x="0" y="0" font-family="Cantarell, Inter, DejaVu Sans, sans-serif"
          font-size="46" font-weight="700" fill="#e0f2fe" letter-spacing="4">ATLAZUS OS</text>
    <text x="2" y="42" font-family="Cantarell, Inter, DejaVu Sans, sans-serif"
          font-size="15" font-weight="400" fill="#67e8f9" letter-spacing="5" opacity="0.72">PRIVATE  /  SECURE  /  LIGHTWEIGHT</text>
    <line x1="0" y1="70" x2="360" y2="70" stroke="url(#line)" stroke-width="2"/>
  </g>
</svg>
