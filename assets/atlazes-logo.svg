<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  ATLAZES OS - Official Logo
  حرف A منمنم داخل دائرة مع مدار مضيء (atlas/orbit metaphor)
  ألوان الهوية: #0a0e27 (داكن) / #00d4ff (سماوي) / #ffffff (أبيض)
  Flat design — قابل للتكبير لأي حجم بدون فقد دقّة
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- تدرّج الخلفية الداكنة -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#1a2148"/>
      <stop offset="100%" stop-color="#0a0e27"/>
    </radialGradient>

    <!-- تدرّج الشعاع السماوي -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>

    <!-- توهّج خفيف حول الشعار -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#00d4ff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- القرص الأساسي (الكوكب) -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- توهّج داخلي ناعم -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- المدار الخارجي المائل (atlas ring) -->
  <ellipse cx="256" cy="256" rx="220" ry="78"
           fill="none" stroke="url(#cyanGrad)" stroke-width="6"
           transform="rotate(-25 256 256)" opacity="0.95"/>

  <!-- نقطة لامعة على المدار -->
  <circle cx="256" cy="256" r="8" fill="#ffffff"
          transform="translate(208 -78) rotate(-25 256 256)"/>

  <!-- إطار دائري داخلي رفيع -->
  <circle cx="256" cy="256" r="178"
          fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.35"/>

  <!-- حرف A منمنم — مبنيّ من مثلّث + شريط أفقي -->
  <!-- الساق اليسرى -->
  <path d="M 256 130 L 168 360 L 200 360 L 220 305 L 292 305 L 312 360 L 344 360 Z"
        fill="url(#cyanGrad)"/>
  <!-- الفجوة الداخلية لإعطاء شكل A نظيف -->
  <path d="M 256 195 L 232 275 L 280 275 Z" fill="#0a0e27"/>

  <!-- شريط أفقي abstract (atlas/horizon) داخل الـ A -->
  <rect x="232" y="285" width="48" height="6" fill="#ffffff" opacity="0.95"/>

  <!-- نقطة accent بيضاء فوق رأس A -->
  <circle cx="256" cy="118" r="7" fill="#ffffff"/>
</svg>
