  <g opacity="0.28">
    <line x1="420" y1="538" x2="1500" y2="538" stroke="url(#accent)" stroke-width="2"/>
    <line x1="570" y1="584" x2="1350" y2="584" stroke="url(#accent)" stroke-width="1"/>
